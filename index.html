<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List App</title>

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<!-- Card Container -->
<div class="bg-white shadow-lg rounded-xl p-6 w-full max-w-md">

    <h1 class="text-2xl font-bold text-center mb-4">To Do List</h1>

    <!-- Input + Button -->
    <div class="flex gap-2 mb-4">
        <input 
            type="text" 
            id="todo" 
            placeholder="Add new task..."
            class="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        >

        <button 
            id="add-btn"
            class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition"
        >
            Add
        </button>
    </div>

    <!-- Task List -->
    <ul id="task-list" class="space-y-2"></ul>

</div>

<script>
const input = document.getElementById("todo");
const addBtn = document.getElementById("add-btn");
const tasklist = document.getElementById("task-list");

addBtn.addEventListener('click', () => {

    const taskvalue = input.value.trim();

    if (taskvalue === "") {
        alert("Please enter a task!");
        return;
    }

    const li = document.createElement('li');

    li.className = "flex justify-between items-center bg-gray-100 px-3 py-2 rounded-lg";

    li.innerHTML = `
        <span>${taskvalue}</span>
        <button class="delete-btn bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 transition">
            Delete
        </button>
    `;

    li.querySelector('.delete-btn').addEventListener('click', () => {
        li.remove();
    });

    tasklist.appendChild(li);
    input.value = "";
});
</script>

</body>
</html>
